<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ReWear Sustainable Fashion Marketplace</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-green: #1d4f3e;
            --light-green: #2d7a5c;
            --accent-green: #3db870;
            --bright-green: #2ecc71;
            --beige: #fff8f0;
            --light-beige: #fffbf7;
            --dark-text: #0f1419;
            --text-gray: #5a5a5a;
            --light-gray: #e8e6e1;
            --border-color: #ddd9d0;
            --shadow: 0 6px 20px rgba(45, 122, 92, 0.15);
            --shadow-lg: 0 16px 48px rgba(45, 122, 92, 0.25);
            --coral: #ff6b6b;
            --gold: #ffc857;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1d4f3e 0%, #2d7a5c 50%, #3db870 100%);
            color: var(--dark-text);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 500px;
            height: 500px;
            background: rgba(62, 184, 112, 0.1);
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
        }

        body::after {
            content: '';
            position: absolute;
            bottom: -30%;
            left: -5%;
            width: 400px;
            height: 400px;
            background: rgba(46, 204, 113, 0.08);
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
        }

        /* Main Container */
        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 2rem;
            position: relative;
            z-index: 1;
        }

        /* Card */
        .login-card {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 24px;
            padding: 3rem;
            box-shadow: var(--shadow-lg);
            animation: slideUp 0.6s ease;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        /* Logo Section */
        .logo-section {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .logo {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        .brand-name {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #1d4f3e 0%, #2ecc71 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
            margin-bottom: 0.5rem;
        }

        .brand-name span {
            background: linear-gradient(135deg, #2ecc71 0%, #3db870 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .tagline {
            font-size: 0.95rem;
            color: var(--text-gray);
            font-weight: 500;
            margin-top: 0.8rem;
            letter-spacing: 0.3px;
        }

        /* Welcome Text */
        .welcome-text {
            text-align: center;
            margin-bottom: 2rem;
        }

        .welcome-heading {
            font-size: 1.6rem;
            background: linear-gradient(135deg, #1d4f3e 0%, #2ecc71 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
            font-weight: 800;
        }

        .welcome-description {
            font-size: 0.9rem;
            color: var(--text-gray);
        }

        /* Form */
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        /* Form Group */
        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-weight: 600;
            color: var(--dark-text);
            margin-bottom: 0.6rem;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .label-icon {
            font-size: 1rem;
        }

        .form-group input {
            padding: 1rem;
            border: 1.5px solid var(--border-color);
            border-radius: 10px;
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.3s ease;
            background-color: var(--light-beige);
        }

        .form-group input:focus {
            outline: none;
            border-color: #2ecc71;
            background: linear-gradient(135deg, rgba(46, 204, 113, 0.02), rgba(46, 204, 113, 0.05));
            box-shadow: 0 0 0 4px rgba(46, 204, 113, 0.15);
        }

        .form-group input::placeholder {
            color: #bbb;
        }

        /* Remember Me & Forgot Password */
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            cursor: pointer;
        }

        .remember-me input {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #2ecc71;
        }

        .remember-me label {
            cursor: pointer;
            color: var(--text-gray);
            font-weight: 500;
        }

        .forgot-password {
            color: #2ecc71;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .forgot-password:hover {
            color: #27ae60;
            text-decoration: underline;
        }

        /* Login Button */
        .login-button {
            padding: 1.1rem;
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 24px rgba(46, 204, 113, 0.4);
            margin-top: 0.5rem;
            position: relative;
            overflow: hidden;
        }

        .login-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.2);
            transition: left 0.3s ease;
        }

        .login-button:hover::before {
            left: 100%;
        }

        .login-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 32px rgba(46, 204, 113, 0.5);
        }

        .login-button:active {
            transform: translateY(-1px);
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 1.5rem 0;
            color: var(--text-gray);
            font-size: 0.85rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background-color: var(--border-color);
        }

        /* Social Login */
        .social-login {
            display: flex;
            gap: 1rem;
        }

        .social-button {
            flex: 1;
            padding: 0.9rem;
            border: 2px solid var(--border-color);
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.8), rgba(255, 251, 247, 0.5));
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1.4rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .social-button:hover {
            border-color: #2ecc71;
            background: linear-gradient(135deg, rgba(46, 204, 113, 0.08), rgba(46, 204, 113, 0.05));
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(46, 204, 113, 0.2);
        }

        /* Register Section */
        .register-section {
            text-align: center;
            margin-top: 1.8rem;
            padding-top: 1.8rem;
            border-top: 1px solid var(--border-color);
        }

        .register-text {
            font-size: 0.95rem;
            color: var(--text-gray);
        }

        .register-link {
            color: #2ecc71;
            text-decoration: none;
            font-weight: 700;
            transition: all 0.3s ease;
            margin-left: 0.3rem;
            position: relative;
        }

        .register-link::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, #2ecc71, #3db870);
            transition: width 0.3s ease;
        }

        .register-link:hover::after {
            width: 100%;
        }

        /* Alert Message */
        .alert {
            padding: 1rem;
            border-radius: 10px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            display: none;
        }

        .alert.error {
            background-color: #fadad5;
            color: #c5192d;
            border: 1px solid #f5a09f;
            display: block;
        }

        .alert.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        /* Footer Note */
        .footer-note {
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-gray);
            margin-top: 2rem;
            line-height: 1.5;
        }

        .footer-note a {
            color: var(--light-green);
            text-decoration: none;
        }

        .footer-note a:hover {
            text-decoration: underline;
        }

        /* Animations */
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-card {
            animation: slideUp 0.6s ease;
        }

        .form-group {
            animation: slideUp 0.6s ease forwards;
            opacity: 0;
        }

        .form-group:nth-child(1) { animation-delay: 0.1s; }
        .form-group:nth-child(2) { animation-delay: 0.2s; }

        /* Loading State */
        .login-button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .login-button.loading {
            position: relative;
        }

        .login-button.loading::after {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            right: 1.2rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive Design */
        @media (max-width: 480px) {
            .login-container {
                padding: 1rem;
            }

            .login-card {
                padding: 2rem;
            }

            .brand-name {
                font-size: 1.8rem;
            }

            .welcome-heading {
                font-size: 1.3rem;
            }

            .form-options {
                flex-direction: column;
                gap: 0.8rem;
                align-items: flex-start;
            }

            .forgot-password {
                align-self: flex-end;
            }
        }

        /* Dark Mode Support */
        @media (prefers-color-scheme: dark) {
            body {
                background: #1a1a1a;
            }

            .login-card {
                background: #2a2a2a;
                color: #e0e0e0;
            }

            .form-group input {
                background-color: #3a3a3a;
                border-color: #4a4a4a;
                color: #e0e0e0;
            }

            .form-group input:focus {
                background-color: #404040;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <!-- Logo Section -->
            <div class="logo-section">
                <div class="logo">♻️</div>
                <div class="brand-name">Re<span>Wear</span></div>
                <p class="tagline">Redefining Fashion Through Sustainability</p>
            </div>

            <!-- Welcome Text -->
            <div class="welcome-text">
                <h2 class="welcome-heading">Welcome Back</h2>
                <p class="welcome-description">Log in to your sustainable fashion journey</p>
            </div>

            <!-- Alert Messages -->
            <div class="alert error" id="errorAlert"></div>
            <div class="alert success" id="successAlert"></div>

            <!-- Login Form -->
            <form class="login-form" id="loginForm">
                <!-- Email Field -->
                <div class="form-group">
                    <label for="email">
                        <span class="label-icon">📧</span>
                        Email Address
                    </label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="you@example.com" 
                        required
                    >
                </div>

                <!-- Password Field -->
                <div class="form-group">
                    <label for="password">
                        <span class="label-icon">🔐</span>
                        Password
                    </label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="••••••••" 
                        required
                    >
                </div>

                <!-- Remember Me & Forgot Password -->
                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" name="remember" id="remember">
                        <span class="remember-me-label">Remember me</span>
                    </label>
                    <a href="#" class="forgot-password">Forgot password?</a>
                </div>

                <!-- Login Button -->
                <button type="submit" class="login-button">Sign In</button>
            </form>

            <!-- Divider -->
            <div class="divider">or</div>

            <!-- Social Login -->
            <div class="social-login">
                <button type="button" class="social-button" title="Sign in with Google">
                    🔷
                </button>
                <button type="button" class="social-button" title="Sign in with Apple">
                    🍎
                </button>
                <button type="button" class="social-button" title="Sign in with Facebook">
                    👥
                </button>
            </div>

            <!-- Register Section -->
            <div class="register-section">
                <p class="register-text">
                    Don't have an account?
                    <a href="#" class="register-link">Sign up</a>
                </p>
            </div>

            <!-- Footer Note -->
            <div class="footer-note">
                By signing in, you agree to our 
                <a href="#">Terms of Service</a> and 
                <a href="#">Privacy Policy</a>
            </div>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const errorAlert = document.getElementById('errorAlert');
        const successAlert = document.getElementById('successAlert');
        const loginButton = loginForm.querySelector('.login-button');

        // Form submission handler
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            errorAlert.style.display = 'none';
            successAlert.style.display = 'none';

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();

            // Validation
            if (!email) {
                showError('Please enter your email address');
                return;
            }

            if (!email.includes('@')) {
                showError('Please enter a valid email address');
                return;
            }

            if (!password) {
                showError('Please enter your password');
                return;
            }

            if (password.length < 6) {
                showError('Password must be at least 6 characters long');
                return;
            }

            // Simulate login
            simulateLogin(email);
        });

        function showError(message) {
            errorAlert.textContent = '❌ ' + message;
            errorAlert.style.display = 'block';
            errorAlert.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        function showSuccess(message) {
            successAlert.textContent = '✓ ' + message;
            successAlert.style.display = 'block';
            successAlert.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        function simulateLogin(email) {
            // Show loading state
            loginButton.disabled = true;
            loginButton.classList.add('loading');
            loginButton.textContent = 'Signing in...';

            // Simulate network request
            setTimeout(() => {
                // Reset button
                loginButton.disabled = false;
                loginButton.classList.remove('loading');
                loginButton.textContent = 'Sign In';

                // Show success message
                showSuccess(`Welcome back! Logging in as ${email}`);

                // Clear form
                loginForm.reset();

                // Simulate redirect after 2 seconds
                setTimeout(() => {
                    // In a real app, this would redirect to dashboard
                    console.log('Redirecting to dashboard...');
                }, 2000);
            }, 1500);
        }

        // Social login handlers
        document.querySelectorAll('.social-button').forEach(button => {
            button.addEventListener('click', (e) => {
                e.preventDefault();
                const provider = button.getAttribute('title').replace('Sign in with ', '');
                showSuccess(`Connecting with ${provider}...`);
            });
        });

        // Register link handler
        document.querySelector('.register-link').addEventListener('click', (e) => {
            e.preventDefault();
            console.log('Navigate to registration page');
        });

        // Forgot password handler
        document.querySelector('.forgot-password').addEventListener('click', (e) => {
            e.preventDefault();
            console.log('Navigate to password reset page');
        });

        // Real-time validation on input
        document.getElementById('email').addEventListener('blur', function() {
            if (this.value && !this.value.includes('@')) {
                this.style.borderColor = '#f5a09f';
            } else {
                this.style.borderColor = '';
            }
        });

        document.getElementById('password').addEventListener('focus', function() {
            this.style.borderColor = '';
        });
    </script>
</body>
</html>
